<!DOCTYPE html>
<html>

<head>
    
    <p>Click the button to evaluate/execute javascript code/ expressions.</p>

    <button onclick="myFunction()">Try it</button>

    <p id="result"></p>

    <script>
         function myFunction() {
            var x = 10;
            var y = 20;
            
            var a = eval("x + y") + "<br>";
            var b = eval("x * y") + "<br>";
            var c = eval("x / y") + "<br>";
            document.getElementById("result").innerHTML = a + b + c;
        }

    </script>
    
</body>
</html>
